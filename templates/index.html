<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie_AI Sprint 1</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=sprint1">
</head>

<body>

<div class="app">

<header>
<h1>🎬 Movie_AI</h1>
<p>AI Video Director</p>
</header>

<main>

<section class="card">
<h2>📷 画像</h2>

<label>画像①</label>
<input type="file" id="photo1" accept="image/*">
<img id="preview1" class="preview">

<label>画像②（任意）</label>
<input type="file" id="photo2" accept="image/*">
<img id="preview2" class="preview">
</section>

<section class="card">
<h2>🤖 AI監督モード</h2>

<label>AI監督</label>
<select id="aiDirector">
<option value="on">ON：AIに全部おすすめさせる</option>
<option value="off">OFF：自分で細かく設定する</option>
</select>

<label>❤️ ロマンス</label>
<select id="romanceMode">
<option value="off">OFF：恋愛演出なし</option>
<option value="on">ON：恋愛演出あり</option>
</select>

<label>❤️ ロマンス強度</label>
<select id="romanceLevel">
<option value="soft">控えめ</option>
<option value="romantic">ロマンチック</option>
<option value="passionate">情熱的</option>
</select>
</section>

<section class="card" id="manualSettings">
<h2>⚙️ 詳細設定</h2>

<label>シーン</label>
<select id="scene">
<option value="romantic beach date">海辺デート</option>
<option value="night city date">夜景デート</option>
<option value="cute cafe">カフェ</option>
<option value="amusement park">遊園地</option>
<option value="travel">旅行</option>
<option value="movie scene">映画風</option>
<option value="korean drama">韓国ドラマ</option>
<option value="summer festival">夏祭り</option>
<option value="snow">雪景色</option>
<option value="cherry blossom">桜</option>
<option value="mountain pass road">峠</option>
<option value="coastal road">海沿い</option>
<option value="race circuit">サーキット</option>
</select>

<label>雰囲気</label>
<select id="mood">
<option value="romantic">ロマンチック</option>
<option value="cute">かわいい</option>
<option value="emotional">感動</option>
<option value="happy">幸せ</option>
<option value="luxury">高級感</option>
<option value="cinematic">映画</option>
<option value="cool">クール</option>
<option value="dramatic">ドラマチック</option>
</select>

<label>ロマンス演出</label>
<select id="romance">
<option value="none">なし</option>
<option value="holding hands">🤝 手をつなぐ</option>
<option value="warm hug">🤗 ハグ</option>
<option value="gentle kiss">💋 キス</option>
<option value="forehead kiss">😘 おでこキス</option>
<option value="looking into each other's eyes">💞 見つめ合う</option>
<option value="proposal">💍 プロポーズ</option>
<option value="dancing together">💃 ダンス</option>
<option value="embracing in the rain">☔ 雨の中で抱き合う</option>
</select>

<label>カメラ</label>
<select id="camera">
<option value="cinematic">映画</option>
<option value="drone shot">ドローン</option>
<option value="close up">クローズアップ</option>
<option value="POV">POV</option>
<option value="slow motion">スローモーション</option>
<option value="handheld">手持ち</option>
</select>

<label>監督レベル</label>
<select id="director">
<option value="simple">😊 初級</option>
<option value="cinematic">🎬 映画監督</option>
<option value="hollywood">🏆 ハリウッド監督</option>
</select>

<label>動画AI</label>
<select id="service">
<option>Kling</option>
<option>Runway</option>
<option>Pika</option>
<option>Veo</option>
<option>Luma</option>
</select>
</section>

<section class="card">
<button id="generateBtn">🎬 AIプロンプト生成</button>
</section>

<section class="card">
<h2>🧠 AI生成結果</h2>
<textarea id="result" placeholder="ここにAI生成プロンプトが出るよ"></textarea>
<button id="copyBtn" class="subButton">📋 コピー</button>
</section>

</main>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}?v=sprint1"></script>

</body>
</html>
